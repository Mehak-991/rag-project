version: '3.8'

services:
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
      - ./evaluation:/app/evaluation
    environment:
      - APP_NAME=Cost-Efficient RAG
      - APP_VERSION=1.0.0
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - CHROMA_PERSIST_DIR=/app/chroma_db
      - CHROMA_COLLECTION_NAME=rag_collection
      - EMBEDDING_MODEL_NAME=BAAI/bge-small-en-v1.5
      - EMBEDDING_DEVICE=cpu
      - DEFAULT_CHUNK_SIZE=1000
      - DEFAULT_CHUNK_OVERLAP=200
      - DEFAULT_TOP_K=5
      - SIMILARITY_THRESHOLD=0.7
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:7b
      - LLM_TEMPERATURE=0.7
      - LLM_MAX_TOKENS=2048
      - LOG_DIR=/app/logs
      - LOG_LEVEL=INFO
      - LOG_ROTATION=500 MB
      - LOG_RETENTION=30 days
      - EVALUATION_DIR=/app/evaluation
      - EVALUATION_K_VALUES=3,5,10
    depends_on:
      - ollama
    networks:
      - rag-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - rag-network
    restart: unless-stopped
    # Uncomment to pull model on startup
    # command: sh -c "ollama serve & sleep 10 && ollama pull qwen2.5:7b && tail -f /dev/null"

networks:
  rag-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
